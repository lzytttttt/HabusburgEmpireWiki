<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      .land { fill: #c8a2c8; stroke: #333; stroke-width: 1; }
      .habsburg { fill: #8b45a6; stroke: #333; stroke-width: 1.5; }
      .lost { fill: #e8b4b4; stroke: #c00; stroke-width: 1.5; stroke-dasharray: 5,3; }
      .water { fill: #b3d9ff; stroke: none; }
      .city { fill: #333; }
      .city-label { font-size: 11px; fill: #333; font-family: sans-serif; }
      .title { font-size: 18px; fill: #333; font-weight: bold; font-family: sans-serif; }
      .legend { font-size: 12px; fill: #333; font-family: sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f5f5f0"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" class="title">哈布斯堡帝国疆域 1648年（威斯特伐利亚和约后）</text>

  <!-- Simplified European outline -->
  <path class="land" d="M 200,150 L 250,120 L 350,100 L 450,110 L 550,130 L 600,180 L 620,250 L 600,320 L 550,380 L 500,400 L 450,420 L 400,430 L 350,420 L 300,400 L 250,370 L 220,320 L 200,270 L 190,220 Z"/>

  <!-- Habsburg territories 1648 -->
  <!-- Austria (core) -->
  <path class="habsburg" d="M 380,200 L 420,180 L 460,190 L 480,220 L 470,260 L 440,280 L 400,270 L 380,240 Z"/>
  <text x="430" y="235" text-anchor="middle" class="city-label">奥地利</text>

  <!-- Bohemia (restored after war) -->
  <path class="habsburg" d="M 350,170 L 400,150 L 440,160 L 450,190 L 420,200 L 380,200 L 350,185 Z"/>
  <text x="400" y="180" text-anchor="middle" class="city-label">波西米亚</text>

  <!-- Hungary (reduced) -->
  <path class="habsburg" d="M 460,220 L 520,200 L 560,220 L 570,260 L 550,300 L 520,310 L 490,300 L 460,270 L 450,240 Z"/>
  <text x="515" y="260" text-anchor="middle" class="city-label">匈牙利</text>

  <!-- Spanish Netherlands (lost) -->
  <path class="lost" d="M 250,170 L 290,155 L 320,165 L 315,190 L 285,200 L 255,190 Z"/>
  <text x="285" y="185" text-anchor="middle" class="city-label" font-size="8">尼德兰</text>
  <text x="285" y="195" text-anchor="middle" font-size="8" fill="#c00" font-family="sans-serif">（失去）</text>

  <!-- Milan (retained) -->
  <path class="habsburg" d="M 280,270 L 320,250 L 350,260 L 340,290 L 310,300 L 280,290 Z"/>
  <text x="315" y="278" text-anchor="middle" class="city-label" font-size="9">米兰</text>

  <!-- Cities -->
  <circle cx="430" cy="220" r="4" class="city"/>
  <text x="445" y="218" class="city-label">维也纳</text>

  <circle cx="400" cy="165" r="3" class="city"/>
  <text x="415" y="163" class="city-label" font-size="9">布拉格</text>

  <!-- Water bodies -->
  <ellipse cx="500" cy="450" rx="80" ry="40" class="water"/>
  <text x="500" y="455" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">地中海</text>

  <!-- Legend -->
  <rect x="50" y="500" width="220" height="80" fill="white" stroke="#ccc"/>
  <rect x="60" y="515" width="20" height="15" class="habsburg"/>
  <text x="90" y="527" class="legend">哈布斯堡领土</text>
  <rect x="60" y="540" width="20" height="15" class="lost"/>
  <text x="90" y="552" class="legend">战争中失去的领土</text>
  <circle cx="70" cy="570" r="3" class="city"/>
  <text x="90" y="573" class="legend">主要城市</text>

  <!-- North arrow -->
  <g transform="translate(750,80)">
    <line x1="0" y1="30" x2="0" y2="-30" stroke="#333" stroke-width="2"/>
    <polygon points="0,-35 -5,-25 5,-25" fill="#333"/>
    <text x="0" y="-40" text-anchor="middle" font-size="12" fill="#333" font-family="sans-serif">N</text>
  </g>
</svg>
