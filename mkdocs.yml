site_name: 哈布斯堡帝国的崛起
site_description: 基于玛玛吉所著 Rise of the Habsburg Empire, 1526-1851 中译初稿整理的 wiki
site_author: lzytttttt
site_url: https://lzytttttt.github.io/HabusburgEmpireWiki/
repo_url: https://github.com/lzytttttt/HabusburgEmpireWiki
repo_name: HabusburgEmpireWiki

docs_dir: wiki

theme:
  name: material
  language: zh
  icon:
    logo: material/book-open-page-variant
    favicon: assets/images/favicon.svg
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Noto Sans SC
    code: Fira Code
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.splitter
    - content.code.copy
    - content.tooltips
  edit_uri: edit/main/wiki/

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - 首页: Home.md
  - 章节目录:
    - 章节总览: Chapters.md
    - 1. 奥地利和哈布斯堡家族: chapters/ch01-austria-and-habsburg.md
    - 2. 波西米亚: chapters/ch02-bohemia.md
    - 3. 匈牙利: chapters/ch03-hungary.md
    - 4. 哈布斯堡帝国的形成: chapters/ch04-formation-of-habsburg-empire.md
    - 5. 三十年战争: chapters/ch05-thirty-years-war.md
    - 6. 巩固和扩张: chapters/ch06-consolidation-and-expansion.md
    - 7. 开明专制: chapters/ch07-enlightened-absolutism.md
    - 8. 改革中的帝国: chapters/ch08-empire-in-reform.md
    - 9. 大革命与拿破仑: chapters/ch09-revolution-and-napoleon.md
  - 索引:
    - 人物索引: People.md
    - 地名索引: Places.md
    - 术语表: Glossary.md
  - 参考:
    - 时间线: Timeline.md
    - 交互式时间线: timeline-interactive.md
    - 家族世系表: Habsburg-Genealogy.md
    - 战争列表: Wars.md
    - 条约列表: Treaties.md
  - 项目:
    - 待考问题: Open-Questions.md
    - 校订日志: Editorial-Log.md

extra_css:
  - https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js
  - https://unpkg.com/mermaid/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lzytttttt/HabusburgEmpireWiki
